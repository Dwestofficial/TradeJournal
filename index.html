<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Trade Journal</title>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --surface2: #1c2128;
    --border:   #30363d;
    --blue:     #58a6ff;
    --green:    #3fb950;
    --red:      #f85149;
    --yellow:   #d29922;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --radius:   12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Top Bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }
  .topbar .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .refresh-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--blue);
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .refresh-btn:active { background: var(--border); }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
  }
  .nav-btn {
    flex: 1; padding: 12px 4px 8px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 10px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--blue); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* ── Pages ── */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ── Stat Cards Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red   { color: var(--red); }
  .stat-card .value.blue  { color: var(--blue); }
  .stat-card .value.yellow{ color: var(--yellow); }

  /* ── Wide card ── */
  .stat-card.wide {
    grid-column: 1 / -1;
    display: flex; justify-content: space-between; align-items: center;
  }
  .stat-card.wide .side { text-align: center; flex: 1; }
  .stat-card.wide .divider { width: 1px; background: var(--border); height: 40px; }

  /* ── Section title ── */
  .section-title {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin: 20px 0 10px;
  }

  /* ── Trade Cards ── */
  .trade-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }
  .trade-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .trade-card.win::before  { background: var(--green); }
  .trade-card.loss::before { background: var(--red); }

  .trade-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .trade-symbol { font-size: 15px; font-weight: 700; }
  .trade-dir {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 6px; margin-top: 3px;
  }
  .trade-dir.buy  { background: rgba(88,166,255,0.15); color: var(--blue); }
  .trade-dir.sell { background: rgba(248,81,73,0.15);  color: var(--red); }

  .trade-pnl { text-align: right; }
  .trade-pnl .amount { font-size: 17px; font-weight: 700; }
  .trade-pnl .pct    { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .trade-details {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .detail-item .d-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .detail-item .d-val   { font-size: 12px; font-weight: 500; }

  /* ── Filter Bar ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: all 0.15s;
  }
  .filter-pill.active {
    background: rgba(88,166,255,0.15);
    border-color: var(--blue); color: var(--blue);
  }

  /* ── Loading / Empty ── */
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Settings ── */
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden;
  }
  .settings-row {
    display: flex; align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row .s-label { flex: 1; font-size: 14px; }
  .settings-row .s-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .url-input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 13px;
    margin-top: 8px;
  }
  .save-btn {
    width: 100%; background: var(--blue); color: #000;
    border: none; border-radius: 8px; padding: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 12px; transition: opacity 0.15s;
  }
  .save-btn:active { opacity: 0.8; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 20px;
    font-size: 13px; color: var(--text);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* ── No trades ── */
  .empty {
    text-align: center; padding: 50px 20px; color: var(--muted);
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div>
    <h1>📊 Trade Journal</h1>
    <div class="subtitle" id="last-updated">Pull to refresh</div>
  </div>
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</div>

<!-- Pages -->
<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div id="dashboard-content">
    <div class="loading"><div class="spinner"></div>Loading stats...</div>
  </div>
</div>

<!-- TRADES -->
<div class="page" id="page-trades">
  <div class="filter-bar">
    <div class="filter-pill active" data-filter="all"   onclick="setFilter('all',this)">All</div>
    <div class="filter-pill"        data-filter="win"   onclick="setFilter('win',this)">Wins</div>
    <div class="filter-pill"        data-filter="loss"  onclick="setFilter('loss',this)">Losses</div>
    <div class="filter-pill"        data-filter="buy"   onclick="setFilter('buy',this)">Buy</div>
    <div class="filter-pill"        data-filter="sell"  onclick="setFilter('sell',this)">Sell</div>
  </div>
  <div id="trades-content">
    <div class="loading"><div class="spinner"></div>Loading trades...</div>
  </div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="section-title">API Configuration</div>
  <div class="settings-card">
    <div class="settings-row" style="flex-direction:column; align-items:flex-start;">
      <div class="s-label">Apps Script URL</div>
      <div class="s-sub">Paste your Google Apps Script Web App URL</div>
      <input class="url-input" id="api-url-input" type="url"
             placeholder="https://script.google.com/macros/s/..." />
    </div>
  </div>
  <button class="save-btn" onclick="saveSettings()">Save & Connect</button>

  <div class="section-title" style="margin-top:24px;">About</div>
  <div class="settings-card">
    <div class="settings-row">
      <div>
        <div class="s-label">MT5 Trade Journal</div>
        <div class="s-sub">Auto-synced from MetaTrader 5 via EA</div>
      </div>
    </div>
    <div class="settings-row">
      <div>
        <div class="s-label">Version</div>
        <div class="s-sub">1.0.0</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </button>
  <button class="nav-btn" id="nav-trades" onclick="showPage('trades')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Trades
  </button>
  <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    Settings
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let API_URL    = localStorage.getItem("tj_api_url") || "";
let allTrades  = [];
let activeFilter = "all";
let currentPage  = "dashboard";

// ── Init ────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  const savedUrl = localStorage.getItem("tj_api_url");
  if (savedUrl) {
    document.getElementById("api-url-input").value = savedUrl;
    loadAll();
  } else {
    showPage("settings");
    showToast("Set your Apps Script URL in Settings first");
  }
});

// ── Navigation ───────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.getElementById("nav-" + name).classList.add("active");
  currentPage = name;
}

// ── Settings ─────────────────────────────────────────────────────────────────
function saveSettings() {
  const url = document.getElementById("api-url-input").value.trim();
  if (!url || !url.startsWith("https://")) {
    showToast("Please enter a valid HTTPS URL"); return;
  }
  localStorage.setItem("tj_api_url", url);
  API_URL = url;
  showToast("Saved! Loading data...");
  setTimeout(() => { showPage("dashboard"); loadAll(); }, 600);
}

// ── Load Data ────────────────────────────────────────────────────────────────
async function loadAll() {
  if (!API_URL) { showPage("settings"); return; }
  await Promise.all([loadStats(), loadTrades()]);
  const now = new Date().toLocaleTimeString();
  document.getElementById("last-updated").textContent = "Updated " + now;
}

async function loadStats() {
  document.getElementById("dashboard-content").innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading stats...</div>';
  try {
    const res  = await fetch(API_URL + "?action=getStats", { cache: "no-store" });
    const json = await res.json();
    if (json.status === "ok") renderDashboard(json.stats);
    else throw new Error(json.message);
  } catch(e) {
    document.getElementById("dashboard-content").innerHTML =
      '<div class="loading">Failed to load stats.<br><small>' + e.message + '</small></div>';
  }
}

async function loadTrades() {
  document.getElementById("trades-content").innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading trades...</div>';
  try {
    const res  = await fetch(API_URL + "?action=getTrades", { cache: "no-store" });
    const json = await res.json();
    if (json.status === "ok") { allTrades = json.trades || []; renderTrades(); }
    else throw new Error(json.message);
  } catch(e) {
    document.getElementById("trades-content").innerHTML =
      '<div class="loading">Failed to load trades.<br><small>' + e.message + '</small></div>';
  }
}

// ── Render Dashboard ──────────────────────────────────────────────────────────
function renderDashboard(s) {
  if (!s || s.totalTrades === 0) {
    document.getElementById("dashboard-content").innerHTML =
      '<div class="empty"><div class="icon">📭</div><p>No trades recorded yet.<br>Start trading with MT5 and trades will appear here.</p></div>';
    return;
  }

  const wr     = s.winRate || 0;
  const net    = s.totalNet || 0;
  const pf     = s.profitFactor || 0;
  const rr     = s.avgRR || 0;

  document.getElementById("dashboard-content").innerHTML = `
    <div class="stats-grid">
      <div class="stat-card wide">
        <div class="side">
          <div class="label">Total Trades</div>
          <div class="value blue">${s.totalTrades}</div>
        </div>
        <div class="divider"></div>
        <div class="side">
          <div class="label">Win Rate</div>
          <div class="value ${wr >= 50 ? 'green':'red'}">${wr}%</div>
        </div>
        <div class="divider"></div>
        <div class="side">
          <div class="label">W / L</div>
          <div class="value">${s.wins} / ${s.losses}</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="label">Net P&amp;L</div>
        <div class="value ${net >= 0 ? 'green':'red'}">${net >= 0 ? '+' : ''}$${net}</div>
      </div>
      <div class="stat-card">
        <div class="label">Profit Factor</div>
        <div class="value ${pf >= 1 ? 'green':'red'}">${pf}</div>
      </div>

      <div class="stat-card">
        <div class="label">Avg R:R</div>
        <div class="value ${rr >= 1 ? 'green':'yellow'}">${rr}R</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg P&amp;L %</div>
        <div class="value ${s.avgPnlPct >= 0 ? 'green':'red'}">${s.avgPnlPct}%</div>
      </div>

      <div class="stat-card">
        <div class="label">Best Trade</div>
        <div class="value green">+$${s.bestTrade}</div>
      </div>
      <div class="stat-card">
        <div class="label">Worst Trade</div>
        <div class="value red">$${s.worstTrade}</div>
      </div>
    </div>
  `;
}

// ── Render Trades ─────────────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  renderTrades();
}

function renderTrades() {
  let trades = allTrades;

  if (activeFilter === "win")  trades = trades.filter(t => t["Result"] === "WIN");
  if (activeFilter === "loss") trades = trades.filter(t => t["Result"] === "LOSS");
  if (activeFilter === "buy")  trades = trades.filter(t => (t["Direction"]||"").toLowerCase().includes("buy"));
  if (activeFilter === "sell") trades = trades.filter(t => (t["Direction"]||"").toLowerCase().includes("sell"));

  if (trades.length === 0) {
    document.getElementById("trades-content").innerHTML =
      '<div class="empty"><div class="icon">🔍</div><p>No trades match this filter.</p></div>';
    return;
  }

  const html = trades.map(t => {
    const isWin  = t["Result"] === "WIN";
    const isLong = (t["Direction"]||"").toLowerCase().includes("buy");
    const net    = parseFloat(t["Net P&L"] || 0);
    const pct    = parseFloat(t["P&L %"]   || 0);
    const rr     = parseFloat(t["R:R"]     || 0);

    return `
      <div class="trade-card ${isWin ? 'win' : 'loss'}">
        <div class="trade-header">
          <div>
            <div class="trade-symbol">${t["Symbol"] || "—"}</div>
            <div class="trade-dir ${isLong ? 'buy':'sell'}">${isLong ? '▲ Buy' : '▼ Sell'}</div>
          </div>
          <div class="trade-pnl">
            <div class="amount" style="color:${isWin ? 'var(--green)':'var(--red)'}">
              ${net >= 0 ? '+' : ''}$${Math.round(net*100)/100}
            </div>
            <div class="pct">${pct >= 0 ? '+' : ''}${Math.round(pct*100)/100}%</div>
          </div>
        </div>
        <div class="trade-details">
          <div class="detail-item">
            <div class="d-label">Entry</div>
            <div class="d-val">${t["Entry Price"] || "—"}</div>
          </div>
          <div class="detail-item">
            <div class="d-label">Exit</div>
            <div class="d-val">${t["Exit Price"] || "—"}</div>
          </div>
          <div class="detail-item">
            <div class="d-label">R:R</div>
            <div class="d-val" style="color:${rr >= 1 ? 'var(--green)':'var(--yellow)'}">
              ${Math.round(rr*100)/100}R
            </div>
          </div>
          <div class="detail-item">
            <div class="d-label">Lots</div>
            <div class="d-val">${t["Volume (Lots)"] || "—"}</div>
          </div>
          <div class="detail-item">
            <div class="d-label">Duration</div>
            <div class="d-val">${t["Duration"] || "—"}</div>
          </div>
          <div class="detail-item">
            <div class="d-label">Close</div>
            <div class="d-val" style="font-size:10px">${(t["Close Time"]||"—").split(" ")[1] || t["Close Time"] || "—"}</div>
          </div>
        </div>
      </div>`;
  }).join("");

  document.getElementById("trades-content").innerHTML = html;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
