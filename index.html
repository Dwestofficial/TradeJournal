<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Journal</title>

<style>
:root{
--bg:#0B0F14;
--card:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.06);
--text:#E6EDF3;
--sub:#8B949E;

--green:#00FFA3;
--red:#FF4D6D;
--blue:#4DA3FF;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
}

/* layout */
.container{
padding:16px;
}

/* HERO DASHBOARD */
.hero{
background:linear-gradient(135deg, rgba(0,255,163,0.12), transparent);
border:1px solid var(--border);
border-radius:20px;
padding:22px;
margin-bottom:18px;
box-shadow:0 0 40px rgba(0,255,163,0.08);
}

.hero h1{
font-size:36px;
margin:0;
}

.hero p{
color:var(--green);
font-weight:600;
margin-top:6px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:14px;
backdrop-filter:blur(12px);
}

.card p{
color:var(--sub);
margin:0;
font-size:12px;
}

.card h2{
margin:6px 0 0;
}

/* TRADES */
.trade{
background:var(--card);
border-radius:16px;
padding:16px;
margin-bottom:12px;
border:1px solid var(--border);
}

.trade-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.trade-header h3{
margin:0;
}

.buy{
color:var(--blue);
font-size:12px;
font-weight:600;
}

.sell{
color:var(--red);
font-size:12px;
font-weight:600;
}

.trade-details{
margin-top:10px;
color:var(--sub);
font-size:13px;
}

/* LOGIN */
.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:320px;
padding:24px;
border-radius:20px;
background:var(--card);
border:1px solid var(--border);
box-shadow:0 0 40px rgba(0,255,163,0.08);
}

.login-box h1{
margin-bottom:5px;
}

.login-box p{
color:var(--sub);
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid var(--border);
background:#111;
color:white;
}

button{
width:100%;
margin-top:16px;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00FFA3,#00CFFF);
font-weight:700;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<!-- DASHBOARD HERO -->
<div class="hero">
<h2>FundingPips2-SIM ● LIVE</h2>
<h1>$12,463.91</h1>
<p>+$1,263.91 (+11.2%)</p>
</div>

<!-- METRICS -->
<div class="grid">
<div class="card"><p>Win Rate</p><h2>67%</h2></div>
<div class="card"><p>Profit Factor</p><h2>1.59</h2></div>
<div class="card"><p>Expectancy</p><h2 style="color:var(--green)">+$105</h2></div>
<div class="card"><p>Avg R:R</p><h2>1 : 2.3</h2></div>
</div>

<!-- TRADES -->
<h3>Recent Trades</h3>

<div class="trade">
<div class="trade-header">
<h3>SPX500</h3>
<h3 style="color:var(--green)">+$2121.6</h3>
</div>
<div class="buy">BUY</div>
<div class="trade-details">
Entry: 7241.58 | Exit: 7259.26 | Lots: 2.4
</div>
</div>

<div class="trade">
<div class="trade-header">
<h3>NAS100</h3>
<h3 style="color:var(--red)">-$540</h3>
</div>
<div class="sell">SELL</div>
<div class="trade-details">
Entry: 18200 | Exit: 18150 | Lots: 1.0
</div>
</div>

</div>

</body>
</html>
